---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: llm-port-pii
  name: llm-port-pii-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llm-port-pii-app
  template:
    metadata:
      labels:
        app: llm-port-pii-app
    spec:
      containers:
        - name: app
          image: llm_port_pii:latest
          readinessProbe:
            httpGet:
              path: /api/health
              port: api-port
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: LLM_PORT_PII_HOST
              value: "0.0.0.0"
            - name: LLM_PORT_PII_WORKERS_COUNT
              value: "10"
            - name: LLM_PORT_PII_DB_HOST
              value: "llm-port-pii-db-service"
            - name: LLM_PORT_PII_REDIS_HOST
              value: "llm-port-pii-redis-service"
          resources:
            limits:
              memory: "200Mi"
              cpu: "100m"
          ports:
            - containerPort: 8000
              name: api-port
---
apiVersion: v1
kind: Service
metadata:
  namespace: llm-port-pii
  name: llm-port-pii-app-service
spec:
  selector:
    app: llm-port-pii-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: api-port
      name: api-port

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: llm-port-pii-app
  namespace: llm-port-pii
  labels:
    name: llm-port-pii-app
spec:
  rules:
    - host: llm-port-pii.local
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: llm-port-pii-app-service
                port:
                  name: api-port

---
