---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: llm-port-pii
  name: llm-port-pii-db
spec:
  selector:
    matchLabels:
      app: llm-port-pii-db
  template:
    metadata:
      labels:
        app: llm-port-pii-db
    spec:
      containers:
        - name: database
          image: postgres:16.3-bullseye
          resources:
            limits:
              memory: "300Mi"
              cpu: "200m"
          env:
            - name: POSTGRES_PASSWORD
              value: "llm_port_pii"
            - name: POSTGRES_USER
              value: "llm_port_pii"
            - name: POSTGRES_DB
              value: "llm_port_pii"
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  namespace: llm-port-pii
  name: "llm-port-pii-db-service"
spec:
  selector:
    app: llm-port-pii-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: batch/v1
kind: Job
metadata:
  namespace: llm-port-pii
  name: llm-port-pii-migrator
spec:
  ttlSecondsAfterFinished: 100
  template:
    spec:
      containers:
      - name: migrator
        image: llm_port_pii:latest
        command:
          - "alembic"
          - "upgrade"
          - "head"
        resources:
          limits:
            memory: "200Mi"
            cpu: "250m"
        env:
          - name: "LLM_PORT_PII_DB_HOST"
            value: "llm-port-pii-db-service"
      initContainers:
        - name: wait-for-db
          image: toschneck/wait-for-it:latest
          command: ["./wait-for-it.sh", "-t", "60", "llm-port-pii-db-service:5432"]
      restartPolicy: Never

---
