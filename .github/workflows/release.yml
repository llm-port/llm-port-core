# Build and release llm-port-node-agent standalone executables.
#
# Produces single-file binaries for Linux (x86_64), Windows (x86_64),
# and macOS (universal2) via PyInstaller.
#
# Usage:
#   1. Bump version in pyproject.toml + __init__.py
#   2. Commit: git commit -am "release: node-agent v0.2.0"
#   3. Tag:    git tag -a node-agent-v0.2.0 -m "Release node-agent v0.2.0"
#   4. Push:   git push origin master --tags

name: Release

on:
  push:
    tags:
      - "node-agent-v*"

permissions:
  contents: write

jobs:
  # ── Create GitHub Release (once) ────────────────────────────────
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  # ── Build standalone executables per platform ───────────────────
  executables:
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: llm-port-node-agent-linux-x86_64
          - os: windows-latest
            artifact: llm-port-node-agent-windows-x86_64.exe
          - os: macos-latest
            artifact: llm-port-node-agent-macos-universal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and PyInstaller
        run: |
          pip install --upgrade pip
          pip install . pyinstaller

      - name: Build executable
        run: >
          pyinstaller
          --onefile
          --clean
          --name "${{ matrix.artifact }}"
          --collect-submodules llm_port_node_agent
          llm_port_node_agent/__main__.py

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}
