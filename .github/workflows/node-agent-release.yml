# Build and release llm-port-node-agent standalone executables.
#
# Produces single-file binaries for Linux (x86_64), Windows (x86_64),
# and macOS (universal2) via PyInstaller.
#
# Trigger:
#   - Push a tag matching node-agent-v* (e.g. node-agent-v0.1.0)
#   - Manual dispatch with optional version override
#
# Outputs:
#   - GitHub Release with attached binaries
#   - Artifact uploads for each platform

name: Release Node Agent

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0). Leave empty to use pyproject.toml version."
        required: false
        default: ""
        type: string
  push:
    tags:
      - "node-agent-v*"

permissions:
  contents: write # needed for creating releases

env:
  AGENT_DIR: llm_port_node_agent

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            binary_name: llmport-agent
            asset_name: llmport-agent-linux-x86_64
          - os: windows-latest
            target: windows-x86_64
            binary_name: llmport-agent.exe
            asset_name: llmport-agent-windows-x86_64.exe
          - os: macos-latest
            target: macos-universal
            binary_name: llmport-agent
            asset_name: llmport-agent-macos-universal

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            llm_port_node_agent

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ${{ env.AGENT_DIR }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install -e .

      - name: Resolve version
        id: version
        shell: bash
        working-directory: ${{ env.AGENT_DIR }}
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/node-agent-v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/node-agent-v}" >> "$GITHUB_OUTPUT"
          else
            VER=$(python -c "from llm_port_node_agent import __version__; print(__version__)")
            echo "version=$VER" >> "$GITHUB_OUTPUT"
          fi

      - name: Build executable
        working-directory: ${{ env.AGENT_DIR }}
        run: pyinstaller node_agent.spec --noconfirm

      - name: Smoke test
        working-directory: ${{ env.AGENT_DIR }}
        shell: bash
        run: |
          ./dist/${{ matrix.binary_name }} --help 2>&1 || true
          # The agent doesn't have --help; just verify it starts and
          # exits cleanly when no backend is reachable (exit code != segfault)
          timeout 3 ./dist/${{ matrix.binary_name }} 2>&1 || true

      - name: Rename artifact
        working-directory: ${{ env.AGENT_DIR }}
        shell: bash
        run: |
          cp "dist/${{ matrix.binary_name }}" "dist/${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ env.AGENT_DIR }}/dist/${{ matrix.asset_name }}
          retention-days: 30

    outputs:
      version: ${{ steps.version.outputs.version }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/node-agent-v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute checksums
        shell: bash
        run: |
          cd artifacts
          find . -type f -not -name "*.sha256" | while read f; do
            sha256sum "$f" | awk '{print $1}' > "${f}.sha256"
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: node-agent-v${{ needs.build.outputs.version }}
          name: "Node Agent v${{ needs.build.outputs.version }}"
          body: |
            ## llm-port Node Agent v${{ needs.build.outputs.version }}

            Standalone executables — no Python installation required.

            ### Quick start
            ```bash
            # Linux
            curl -LO https://github.com/${{ github.repository }}/releases/download/node-agent-v${{ needs.build.outputs.version }}/llmport-agent-linux-x86_64
            chmod +x llmport-agent-linux-x86_64
            sudo mv llmport-agent-linux-x86_64 /usr/local/bin/llmport-agent

            export LLM_PORT_NODE_AGENT_BACKEND_URL=http://<server>:8000
            export LLM_PORT_NODE_AGENT_LOKI_URL=http://<server>:3100
            export LLM_PORT_NODE_AGENT_ENROLLMENT_TOKEN=<token>
            llmport-agent
            ```

            ### Checksums
            SHA-256 checksums are attached as `.sha256` files.
          files: |
            artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
